<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Model</title>
    <style>
        body {
            margin: 0;
        }
        div {
            width: 400px;
            height: 400px;
            background-color:aqua;
            padding: 40px;
            /*shorthand property*/
            border:5px solid red;
            /* 1 value margin : 20px top bottom left right */
            /* 2 value margin : 20px top/bottom 40px left/right */
            /* 3 value margin : 20px top 40px right/left 60px bottom */
            /* 4 value margin : 20px top 40px right 60px bottom 100px left */
            margin:20px 40px 60px 100px;
            outline: 10px dashed violet;
            box-shadow: 40px 20px 20px aquamarine;

        }

        
    </style>
</head>
<body>
    Kodnest
    <div>Box Model</div>
</body>
</html>
