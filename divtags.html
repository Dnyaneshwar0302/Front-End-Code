<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Div Tag</title>
</head>
<body>
    <!-- Block Level Elements :- example: div, pre, p, h1-h6 -->
    <div> Hello</div>
    <div> Hii</div>
    <!-- Inline Level Elements :- example: span, a, img, input -->
     <span> Hello</span>
     <span>Hii</span>
     <p style="color: rgb(255, 43, 778);">Hello KodNest</p>
    <p>Feb Batch students are very <span style= "color: red;">knowledgeable</span>.</p>
</body>
</html>
