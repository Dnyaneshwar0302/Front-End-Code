<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iframe Tag</title>
</head>
<body>
    <h1>My webpage</h1>
    <p>Lorem, ipsum dolor sit amet consectetur adipisicing elit. Ipsa magnam quae repellat provident, sunt quam, quas ipsum in corrupti necessitatibus autem eaque nam, velit alias repudiandae incidunt adipisci! Excepturi, voluptatem.</p>
    <!-- <iframe> tag -->
    <iframe srcdoc="<a href='https://www.flipkart.com' target='frame2'>click here to visit Flipkart</a>" name="frame1" height="200px" width="300px" scrolling="yes"  frameborder="1"></iframe>
    <iframe src="https://www.kodnest.com" name="frame2" width="600px" height="400px" scrolling="yes"  frameborder="1" title="Kodnest Website"></iframe>
</body>
</html>
